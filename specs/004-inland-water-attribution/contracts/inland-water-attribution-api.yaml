openapi: 3.0.3
info:
  title: Inland Water Attribution API
  version: 0.1.0
  description: Contract for generating region ownership that includes deterministic inland-water attribution.
paths:
  /v1/region-ownership/generate:
    post:
      summary: Generate ownership with optional inland-water attribution
      operationId: generateRegionOwnership
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnershipGenerationRequest'
      responses:
        '200':
          description: Ownership generation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnershipGenerationResponse'
  /v1/region-ownership/validation/visual-diff:
    post:
      summary: Record visual PNG comparison result between baseline and new output
      operationId: recordVisualDiff
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisualDiffRequest'
      responses:
        '200':
          description: Visual diff accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisualDiffResponse'
  /v1/region-ownership/validation/in-game:
    post:
      summary: Record in-game lake incorporation validation for a test session
      operationId: recordInGameValidation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InGameValidationRequest'
      responses:
        '200':
          description: In-game validation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InGameValidationResponse'
components:
  schemas:
    OwnershipGenerationRequest:
      type: object
      required:
        - worldId
        - includeInlandWater
      properties:
        worldId:
          type: string
          minLength: 1
        includeInlandWater:
          type: boolean
        minRegionZones:
          type: integer
          minimum: 0
        minComponentZonesForProto:
          type: integer
          minimum: 1
    RegionSummary:
      type: object
      required:
        - regionId
        - landAreaZones
        - inlandWaterAreaZones
        - totalAreaZones
      properties:
        regionId:
          type: integer
          minimum: 0
        landAreaZones:
          type: integer
          minimum: 0
        inlandWaterAreaZones:
          type: integer
          minimum: 0
        totalAreaZones:
          type: integer
          minimum: 0
    AttributionStats:
      type: object
      required:
        - attributedWaterZoneCount
        - unassignedInlandWaterZoneCount
        - attributedWaterBodyCount
        - unassignedWaterBodyCount
      properties:
        attributedWaterZoneCount:
          type: integer
          minimum: 0
        unassignedInlandWaterZoneCount:
          type: integer
          minimum: 0
        attributedWaterBodyCount:
          type: integer
          minimum: 0
        unassignedWaterBodyCount:
          type: integer
          minimum: 0
    OwnershipGenerationResponse:
      type: object
      required:
        - worldId
        - includeInlandWater
        - deterministic
        - attributionStats
        - regionSummaries
      properties:
        worldId:
          type: string
        includeInlandWater:
          type: boolean
        deterministic:
          type: boolean
        attributionStats:
          $ref: '#/components/schemas/AttributionStats'
        regionSummaries:
          type: array
          items:
            $ref: '#/components/schemas/RegionSummary'
    VisualDiffRequest:
      type: object
      required:
        - worldId
        - baselinePngPath
        - candidatePngPath
        - reviewer
        - pass
      properties:
        worldId:
          type: string
          minLength: 1
        baselinePngPath:
          type: string
          minLength: 1
        candidatePngPath:
          type: string
          minLength: 1
        reviewer:
          type: string
          minLength: 1
        pass:
          type: boolean
        notes:
          type: string
    VisualDiffResponse:
      type: object
      required:
        - accepted
      properties:
        accepted:
          type: boolean
    InGameValidationRequest:
      type: object
      required:
        - worldId
        - sessionId
        - reviewer
        - lakesIncorporated
      properties:
        worldId:
          type: string
          minLength: 1
        sessionId:
          type: string
          minLength: 1
        reviewer:
          type: string
          minLength: 1
        lakesIncorporated:
          type: boolean
        notes:
          type: string
    InGameValidationResponse:
      type: object
      required:
        - accepted
      properties:
        accepted:
          type: boolean